name: Release

# Publishes a GitHub Release with the packaged Windows build whenever a
# version tag (e.g. v2.7.0) is pushed. Trigger it with:
#   git tag v2.7.0
#   git push origin v2.7.0

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Sync package version to tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      # Each of these is its own step so a failure fails the job. (A previous
      # multi-line run only surfaced the last command's exit code, which let a
      # half-built app/ slip through and ship a broken release.)
      - name: Build app
        run: npm run build

      # Guard against shipping an incomplete app/ — the renderer is dead without
      # these files, so fail loudly here rather than in users' installs.
      - name: Verify build output
        shell: bash
        run: |
          for f in app/index.html app/bootstrap.min.css app/files/images/backgroundWorkspace.png; do
            if [ ! -f "$f" ]; then
              echo "::error::Build output is incomplete — missing $f"
              exit 1
            fi
          done
          echo "Build output verified."

      # Package, but disable electron-builder's own publishing so the release
      # step below is the single source of truth for uploaded assets.
      - name: Package
        run: npx electron-builder --win --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

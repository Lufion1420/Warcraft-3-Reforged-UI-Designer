name: Release

# Publishes a GitHub Release with the packaged Windows build whenever a
# version tag (e.g. v2.7.0) is pushed. Trigger it with:
#   git tag v2.7.0
#   git push origin v2.7.0

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Sync package version to tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      # configMain.ts is git-ignored but imported by src/ts/main.ts, so the
      # TypeScript compile needs a stub to exist on the runner.
      - name: Create configMain.ts stub
        shell: bash
        run: |
          cat > src/ts/configMain.ts <<'EOF'
          const config = {
              key: '',
              namespace: ''
          }

          export default config;
          EOF

      # Compile + package, but disable electron-builder's own publishing so the
      # release step below is the single source of truth for uploaded assets.
      - name: Build and package
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
